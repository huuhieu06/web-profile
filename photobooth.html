<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HuuHieu PhotoBooth Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Dancing+Script:wght@700&family=Rowdies:wght@700&display=swap');
        
        :root {
            --bg-dark: #0b1121;
            --card-glass: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            overflow-x: hidden;
        }

        .glass-panel {
            background: var(--card-glass);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .camera-mirror {
            transform: scaleX(-1);
        }

        #countdown-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            font-size: 12rem;
            font-weight: 800;
            z-index: 50;
            align-items: center;
            justify-content: center;
            color: #3b82f6;
            text-shadow: 0 0 40px rgba(59, 130, 246, 0.8);
            pointer-events: none;
        }

        .flash-active {
            animation: flashAnim 0.2s ease-out forwards;
        }
        @keyframes flashAnim {
            0% { background: white; opacity: 1; }
            100% { background: transparent; opacity: 0; }
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px #3b82f6;
        }

        .layout-card.active {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        #zoom-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .loading-ring {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="zoom-modal" onclick="closeZoom()">
        <img id="zoomed-image" class="max-w-full max-h-full rounded-xl shadow-2xl object-contain">
        <button class="absolute top-6 right-6 text-white bg-white/10 p-3 rounded-full hover:bg-white/20">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
    </div>

    <header class="max-w-7xl mx-auto px-6 py-8 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center font-bold text-2xl shadow-lg rotate-3">H</div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">Trần <span class="text-blue-500">Hữu Hiếu</span></h1>
                <p class="text-[10px] uppercase tracking-widest text-slate-500 font-semibold">Premium Photobooth</p>
            </div>
        </div>
        <div class="hidden md:flex items-center gap-8 text-sm font-medium text-slate-400">
            <a href="#" class="bg-slate-800 px-4 py-2 rounded-full text-white transition hover:bg-slate-700">Quay lại trang chủ</a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-8 pb-20">
        
        <div class="lg:col-span-3 space-y-6 order-2 lg:order-1">
            <!-- Layout Section -->
            <div class="glass-panel p-6 rounded-[2rem] space-y-4">
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest">1. Chọn Layout</h3>
                <div class="grid grid-cols-2 gap-3" id="layout-container">
                    <button onclick="changeLayout(1, 1, 'basic')" class="layout-card active border-2 border-slate-700 p-3 rounded-2xl text-xs font-bold hover:bg-slate-800 transition">1-CUT</button>
                    <button onclick="changeLayout(4, 2, 'basic')" class="layout-card border-2 border-slate-700 p-3 rounded-2xl text-xs font-bold hover:bg-slate-800 transition">4-CUT Vuông</button>
                    <button onclick="changeLayout(4, 1, 'basic')" class="layout-card border-2 border-slate-700 p-3 rounded-2xl text-xs font-bold hover:bg-slate-800 transition">4-CUT Dọc</button>
                    <button onclick="changeLayout(6, 2, 'basic')" class="layout-card border-2 border-slate-700 p-3 rounded-2xl text-xs font-bold hover:bg-slate-800 transition">6-CUT</button>
                </div>
                
                <h3 class="text-xs font-bold text-blue-500 uppercase tracking-widest pt-2 border-t border-slate-800">Bộ Sưu Tập Lễ Hội</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="changeLayout(4, 1, 'vn')" class="layout-card border-2 border-red-900 p-3 rounded-2xl text-xs font-bold hover:bg-red-900/20 transition flex flex-col items-center">
                        <span> 🇻🇳 Tự hào VN</span>
                    </button>
                    <button onclick="changeLayout(4, 1, 'xmas')" class="layout-card border-2 border-green-800 p-3 rounded-2xl text-xs font-bold hover:bg-green-900/20 transition flex flex-col items-center">
                        <span>🎄 Giáng Sinh</span>
                    </button>
                    <button onclick="changeLayout(4, 1, 'tet')" class="layout-card border-2 border-red-500 p-3 rounded-2xl text-xs font-bold hover:bg-red-500/20 transition flex flex-col items-center text-red-500">
                        <span>🧨 Tết Việt</span>
                    </button>
                    <button onclick="changeLayout(4, 1, 'summer')" class="layout-card border-2 border-yellow-500 p-3 rounded-2xl text-xs font-bold hover:bg-yellow-500/20 transition flex flex-col items-center text-yellow-500">
                        <span>🏖️ Summer</span>
                    </button>
                </div>
            </div>

            <!-- Frame Color Section -->
            <div class="glass-panel p-6 rounded-[2rem] space-y-4">
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest">2. Màu khung phim</h3>
                <div class="flex flex-wrap gap-3" id="color-picker">
                    <button onclick="setFrameColor('#000000', this)" class="w-9 h-9 rounded-full border-2 border-blue-500 bg-black"></button>
                    <button onclick="setFrameColor('#FFFFFF', this)" class="w-9 h-9 rounded-full border-2 border-transparent bg-white"></button>
                    <button onclick="setFrameColor('#FF0000', this)" class="w-9 h-9 rounded-full border-2 border-transparent bg-red-600"></button>
                    <button onclick="setFrameColor('#1e293b', this)" class="w-9 h-9 rounded-full border-2 border-transparent bg-slate-800"></button>
                </div>
            </div>

            <!-- Filter Section -->
            <div class="glass-panel p-6 rounded-[2rem] space-y-4">
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest">3. Bộ lọc</h3>
                <select onchange="applyFilter(this.value)" class="w-full bg-slate-900 border-none rounded-xl p-3 text-sm focus:ring-2 ring-blue-500 outline-none transition">
                    <option value="none">Tự nhiên</option>
                    <option value="grayscale(100%)">Trắng đen</option>
                    <option value="sepia(0.5) contrast(1.2)">Vintage</option>
                    <option value="brightness(1.1) saturate(1.2) contrast(1.1)">Sắc nét</option>
                </select>
            </div>
        </div>

        <!-- Camera Section -->
        <div class="lg:col-span-6 space-y-8 order-1 lg:order-2">
            <div class="relative glass-panel rounded-[3rem] overflow-hidden bg-black aspect-[4/3] shadow-2xl border-4 border-slate-800">
                <video id="video" autoplay playsinline muted class="camera-mirror w-full h-full object-cover"></video>
                <div id="countdown-overlay">3</div>
                <div id="flash-effect" class="absolute inset-0 pointer-events-none z-[60]"></div>
                
                <div id="capture-controls" class="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-4 z-40 hidden">
                    <div id="progress-bar" class="flex gap-3"></div>
                    <button id="pause-btn" onclick="togglePause()" class="bg-white/20 backdrop-blur-md border border-white/30 px-4 py-2 rounded-full text-xs font-bold hover:bg-white/40 transition flex items-center gap-2">
                        <span id="pause-icon">⏸</span> <span id="pause-text">Tạm dừng</span>
                    </button>
                </div>
            </div>

            <div class="flex flex-col items-center gap-4">
                <button id="snap-btn" onclick="handleStartCapture()" class="btn-primary px-16 py-6 rounded-full text-white font-bold text-xl flex items-center gap-3 shadow-xl active:scale-95 transition-all">
                    <span id="btn-text">BẮT ĐẦU CHỤP</span>
                </button>
                <p id="status-text" class="text-slate-500 text-sm font-medium">Hình ảnh sẽ được xuất với độ nét cao nhất.</p>
            </div>
        </div>

        <!-- Result Section -->
        <div class="lg:col-span-3 space-y-6 order-3">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-lg">Kết quả</h2>
                <button onclick="clearAll()" class="text-xs text-red-400 hover:underline transition">Xóa hết</button>
            </div>
            
            <div id="result-gallery" class="space-y-6 max-h-[75vh] overflow-y-auto pr-2">
                <div id="active-preview" class="glass-panel p-3 rounded-3xl"></div>
                <div id="history-gallery" class="space-y-6 pt-4 border-t border-slate-800"></div>
            </div>
        </div>

    </main>

    <canvas id="main-canvas" class="hidden"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const countdownOverlay = document.getElementById('countdown-overlay');
        const flashEffect = document.getElementById('flash-effect');
        const btnText = document.getElementById('btn-text');
        const snapBtn = document.getElementById('snap-btn');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress-bar');
        const captureControls = document.getElementById('capture-controls');
        const pauseIcon = document.getElementById('pause-icon');
        const pauseText = document.getElementById('pause-text');
        const activePreview = document.getElementById('active-preview');
        const historyGallery = document.getElementById('history-gallery');
        const zoomModal = document.getElementById('zoom-modal');
        const zoomedImage = document.getElementById('zoomed-image');

        let currentLayout = { shots: 1, cols: 1, type: 'basic' };
        let currentFrameColor = '#000000';
        let currentFilter = 'none';
        let capturedFrames = [];
        let isCapturing = false;
        let isPaused = false;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 2560 }, 
                        height: { ideal: 1440 }, 
                        facingMode: "user" 
                    }, 
                    audio: false 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play().catch(e => console.error(e));
                    renderComposite();
                };
            } catch (err) {
                const fallback = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = fallback;
            }
        }

        function changeLayout(shots, cols, type = 'basic') {
            if (isCapturing) return;
            currentLayout = { shots, cols, type };
            document.querySelectorAll('.layout-card').forEach(card => card.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            if (type === 'vn') currentFrameColor = '#E60000';
            else if (type === 'xmas') currentFrameColor = '#064e3b';
            else if (type === 'tet') currentFrameColor = '#991b1b';
            else if (type === 'summer') currentFrameColor = '#0369a1';
            
            capturedFrames = [];
            renderComposite();
        }

        function setFrameColor(color, btn) {
            currentFrameColor = color;
            document.querySelectorAll('#color-picker button').forEach(b => b.classList.replace('border-blue-500', 'border-transparent'));
            btn.classList.replace('border-transparent', 'border-blue-500');
            renderComposite();
        }

        function applyFilter(f) {
            currentFilter = f;
            video.style.filter = f;
        }

        function togglePause() {
            isPaused = !isPaused;
            pauseIcon.innerText = isPaused ? "▶" : "⏸";
            pauseText.innerText = isPaused ? "Tiếp tục" : "Tạm dừng";
        }

        async function waitWhilePaused() {
            while (isPaused) await new Promise(r => setTimeout(r, 100));
        }

        async function handleStartCapture() {
            isCapturing = true;
            isPaused = false;
            capturedFrames = [];
            snapBtn.disabled = true;
            statusText.innerText = "Đang chuẩn bị...";
            progressBar.innerHTML = '';
            captureControls.classList.remove('hidden');
            
            for(let i=0; i<currentLayout.shots; i++) {
                const dot = document.createElement('div');
                dot.className = "w-3 h-3 rounded-full bg-white/20 transition-colors duration-300";
                progressBar.appendChild(dot);
            }

            for(let i=0; i < currentLayout.shots; i++) {
                await waitWhilePaused();
                await startCountdown(3);
                await waitWhilePaused();
                await captureSingleFrame();
                renderComposite();
                progressBar.children[i].classList.replace('bg-white/20', 'bg-blue-500');
                if(i < currentLayout.shots - 1) await new Promise(r => setTimeout(r, 800));
            }

            isCapturing = false;
            snapBtn.disabled = false;
            captureControls.classList.add('hidden');
            btnText.innerText = "CHỤP LẠI MỚI";
            renderComposite(true);
        }

        function startCountdown(seconds) {
            return new Promise(resolve => {
                let count = seconds;
                countdownOverlay.style.display = 'flex';
                countdownOverlay.innerText = count;
                const timer = setInterval(() => {
                    if (isPaused) return;
                    count--;
                    if(count > 0) countdownOverlay.innerText = count;
                    else { clearInterval(timer); countdownOverlay.style.display = 'none'; resolve(); }
                }, 800);
            });
        }

        async function captureSingleFrame() {
            flashEffect.classList.add('flash-active');
            setTimeout(() => flashEffect.classList.remove('flash-active'), 200);

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 1440; 
            tempCanvas.height = 1080;
            const tCtx = tempCanvas.getContext('2d');

            const vW = video.videoWidth;
            const vH = video.videoHeight;
            const targetRatio = 4 / 3;
            let sX = 0, sY = 0, sW = vW, sH = vH;
            
            if (vW / vH > targetRatio) {
                sW = vH * targetRatio;
                sX = (vW - sW) / 2;
            } else {
                sH = vW / targetRatio;
                sY = (vH - sH) / 2;
            }

            tCtx.save();
            tCtx.translate(tempCanvas.width, 0);
            tCtx.scale(-1, 1);
            tCtx.filter = currentFilter;
            tCtx.drawImage(video, sX, sY, sW, sH, 0, 0, tempCanvas.width, tempCanvas.height);
            tCtx.restore();

            capturedFrames.push(tempCanvas.toDataURL('image/png', 1.0));
        }

        async function renderComposite(isFinal = false) {
            let photoWidth = 800; 
            let padding = 30;
            let marginX = 80;
            let headerH = 150;
            let footerH = 120;
            
            const photoRatio = 4/3;
            const photoHeight = photoWidth / photoRatio;
            const cols = currentLayout.cols;
            const rows = Math.ceil(currentLayout.shots / cols);

            if (cols === 1 && currentLayout.shots >= 4) {
                photoWidth = 600; 
                padding = 20;
                marginX = 60;
                headerH = 120;
                footerH = 100;
            }

            if (['vn', 'xmas', 'tet', 'summer'].includes(currentLayout.type)) {
                headerH = 140;
                footerH = 180;
            }

            canvas.width = (photoWidth * cols) + (padding * (cols - 1)) + (marginX * 2);
            canvas.height = (photoHeight * rows) + (padding * (rows - 1)) + headerH + footerH;

            ctx.fillStyle = currentFrameColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const scale = canvas.width / 400;

            switch(currentLayout.type) {
                case 'vn': drawVNTheme(scale); break;
                case 'xmas': drawXmasTheme(scale); break;
                case 'tet': drawTetTheme(scale); break;
                case 'summer': drawSummerTheme(scale); break;
                default: 
                    ctx.fillStyle = (currentFrameColor === '#FFFFFF') ? '#000000' : '#FFFFFF';
                    ctx.font = `bold ${Math.floor(scale * 30)}px 'Dancing Script'`;
                    ctx.textAlign = "center";
                    ctx.fillText("HuuHieu Studio", canvas.width / 2, headerH * 0.6);
            }

            for(let i = 0; i < currentLayout.shots; i++) {
                const r = Math.floor(i / cols);
                const c = i % cols;
                const x = marginX + c * (photoWidth + padding);
                const y = headerH + r * (photoHeight + padding);

                if (capturedFrames[i]) {
                    const img = await loadImage(capturedFrames[i]);
                    if (['vn', 'xmas', 'tet', 'summer'].includes(currentLayout.type) && i === 0) {
                        drawArchImage(ctx, img, x, y, photoWidth, photoHeight, 80 * (scale/5));
                    } else {
                        ctx.drawImage(img, x, y, photoWidth, photoHeight);
                    }
                } else {
                    ctx.fillStyle = 'rgba(255,255,255,0.05)';
                    ctx.fillRect(x, y, photoWidth, photoHeight);
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.font = `bold ${Math.floor(photoWidth*0.1)}px Inter`;
                    ctx.textAlign = "center";
                    ctx.fillText(i + 1, x + photoWidth/2, y + photoHeight/2 + 10);
                }
            }

            const dataUrl = canvas.toDataURL('image/png', 0.95);
            updatePreviewUI(dataUrl, isFinal);
        }

        function drawXmasTheme(sc) {
            const w = canvas.width, h = canvas.height;
            ctx.fillStyle = "white";
            for(let i=0; i<60; i++) {
                ctx.beginPath();
                ctx.arc(Math.random()*w, Math.random()*h, Math.random()*3, 0, Math.PI*2);
                ctx.fill();
            }
            drawStyledText(ctx, "MERRY", w/2, 60, 40 * (sc/4), "#ef4444", "#ffffff");
            drawStyledText(ctx, "CHRISTMAS", w/2, h - 80, 50 * (sc/4), "#ef4444", "#ffffff");
            ctx.font = `${30 * (sc/4)}px Inter`;
            ctx.fillText("🎄 🎅 🎁", w/2, h - 30);
        }

        function drawTetTheme(sc) {
            const w = canvas.width, h = canvas.height;
            ctx.fillStyle = "#facc15";
            for(let i=0; i<80; i++) {
                ctx.beginPath();
                ctx.arc(Math.random()*w, Math.random()*h, 4 * Math.random(), 0, Math.PI*2);
                ctx.fill();
            }
            drawStyledText(ctx, "CHÚC MỪNG", w/2, 60, 40 * (sc/4), "#facc15", "#7f1d1d");
            drawStyledText(ctx, "NĂM MỚI", w/2, h - 80, 50 * (sc/4), "#facc15", "#7f1d1d");
            ctx.font = `${30 * (sc/4)}px Inter`;
            ctx.fillText("🧧 🧨 🌸", w/2, h - 30);
        }

        function drawSummerTheme(sc) {
            const w = canvas.width, h = canvas.height;
            ctx.fillStyle = "#fbbf24";
            ctx.beginPath();
            ctx.arc(80, 80, 40, 0, Math.PI*2);
            ctx.fill();
            drawStyledText(ctx, "HELLO", w/2, 60, 40 * (sc/4), "#ffffff", "#0284c7");
            drawStyledText(ctx, "SUMMER", w/2, h - 80, 60 * (sc/4), "#ffffff", "#0284c7");
            ctx.font = `${30 * (sc/4)}px Inter`;
            ctx.fillText("🌊 🥥 🍦", w/2, h - 30);
        }

        function drawVNTheme(sc) {
            const w = canvas.width, h = canvas.height;
            drawStar(ctx, 80, 80, 5, 30, 15, '#FFD700');
            drawStyledText(ctx, "TỰ HÀO", w/2, h - 110, 40 * (sc/4), "#FFCC00", "#400000");
            drawStyledText(ctx, "VIỆT NAM", w/2, h - 60, 45 * (sc/4), "#FFCC00", "#400000");
            ctx.font = `${30 * (sc/4)}px Inter`;
            ctx.fillText("🏛️ 🛵 🇻🇳", w/2, h - 25);
        }

        function drawStyledText(ctx, text, x, y, size, fill, stroke) {
            ctx.font = `900 ${size}px Rowdies`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.strokeStyle = stroke;
            ctx.lineWidth = size/5;
            ctx.strokeText(text, x, y);
            ctx.fillStyle = fill;
            ctx.fillText(text, x, y);
        }

        function drawArchImage(ctx, img, x, y, width, height, radius) {
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(x, y + height);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height);
            ctx.closePath();
            ctx.clip();
            ctx.drawImage(img, x, y, width, height);
            ctx.restore();
        }

        function drawStar(ctx, cx, cy, spikes, outer, inner, color) {
            let rot = Math.PI / 2 * 3;
            let step = Math.PI / spikes;
            ctx.beginPath(); ctx.moveTo(cx, cy - outer);
            for (let i = 0; i < spikes; i++) {
                ctx.lineTo(cx + Math.cos(rot) * outer, cy + Math.sin(rot) * outer); rot += step;
                ctx.lineTo(cx + Math.cos(rot) * inner, cy + Math.sin(rot) * inner); rot += step;
            }
            ctx.closePath(); ctx.fillStyle = color; ctx.fill();
        }

        function loadImage(src) {
            return new Promise(resolve => {
                const img = new Image(); img.onload = () => resolve(img); img.src = src;
            });
        }

        function updatePreviewUI(dataUrl, isFinal) {
            activePreview.innerHTML = `
                <div class="relative group rounded-2xl overflow-hidden shadow-2xl border border-white/10 flex justify-center bg-slate-900/50">
                    <img src="${dataUrl}" class="max-h-[500px] w-auto object-contain" id="current-img">
                    <button onclick="openZoom('${dataUrl}')" class="absolute top-2 right-2 bg-black/50 p-2 rounded-full text-white opacity-0 group-hover:opacity-100 transition-opacity">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
                ${isFinal ? `
                <div class="mt-4 grid grid-cols-2 gap-2">
                    <button onclick="downloadImage('${dataUrl}')" class="bg-blue-600 py-3 rounded-xl font-bold text-xs hover:bg-blue-500 transition shadow-lg">Tải về</button>
                    <button onclick="archiveAndRestart()" class="bg-slate-800 py-3 rounded-xl font-bold text-xs hover:bg-slate-700 transition">Chụp lại</button>
                </div>
                ` : `<p class="text-[10px] text-center mt-3 text-slate-500 font-bold uppercase tracking-widest">Đang xem trước...</p>`}
            `;
        }

        function openZoom(url) { zoomedImage.src = url; zoomModal.style.display = 'flex'; }
        function closeZoom() { zoomModal.style.display = 'none'; }
        
        function downloadImage(url) {
            const link = document.createElement('a');
            link.href = url;
            link.download = `photobooth-${Date.now()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function archiveAndRestart() {
            const img = document.getElementById('current-img');
            if (img) {
                const historyItem = document.createElement('div');
                historyItem.className = "relative group rounded-xl overflow-hidden mb-4 border border-white/5 opacity-80 hover:opacity-100 transition-all flex justify-center bg-slate-900/30";
                historyItem.innerHTML = `
                    <img src="${img.src}" class="max-h-[300px] w-auto object-contain">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-3">
                         <button onclick="openZoom('${img.src}')" class="bg-white/20 p-2 rounded-lg backdrop-blur-sm text-white text-[10px] font-bold">XEM LẠI</button>
                    </div>
                `;
                historyGallery.prepend(historyItem);
            }
            handleStartCapture();
        }

        function clearAll() { if(confirm("Xóa toàn bộ lịch sử?")) { historyGallery.innerHTML = ''; capturedFrames = []; renderComposite(); } }
        
        window.onload = initCamera;
    </script>
</body>
</html>
